<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>AFA 素材编辑器</title><link rel="stylesheet" href="/style.css">
</head><body>
<header>
  <div class="brand">AFA 素材编辑器 <span>Sprite Studio</span></div>
  <input id="root" placeholder="角色根目录…">
  <button id="scan" class="btn">扫描</button>
  <select id="charsel"></select>
  <label class="seg"><input type="radio" name="flt" value="core" checked> 核心</label>
  <label class="seg"><input type="radio" name="flt" value="all"> 全部</label>
  <span id="stat" class="stat"></span>
  <button id="pack" class="btn primary" disabled>打包新角色</button>
  <button id="apply" class="btn" disabled title="打包(替换帧+未替换原帧)覆盖回角色原目录的 Sprite.sff — 重启游戏看实机补丁。靠原版备份兜底, 可一键还原">装回原目录</button>
  <button id="restore" class="btn" disabled title="用备份的原版精灵覆盖回原目录, 撤销装回 → 重启游戏回原版">还原原版</button>
  <button id="hidepatch" class="btn sub" disabled title="前置一次性操作(不是部署): 生成「隐藏该职业全部时装」的覆盖 NPK 放进 ImagePacks2 — 装备隐藏后重绘的本体才露得出来。生成一次即可, 之后「部署到游戏」会自动连带它">隐藏装备·露出本体</button>
  <button id="deploy" class="btn primary cta" disabled title="主操作: 打包本体重绘 + 把本体包和隐藏包(若已生成)改 % 名丢进 ImagePacks2 覆盖加载 — 只新增 % 文件、不碰客户端原文件, 重启游戏即生效">部署到游戏</button>
</header>

<main>
  <nav id="actions" class="actions"><div class="ph">选角色后这里列动作</div></nav>

  <section class="panes">
    <!-- 上区: 原始动作 — 帧动画横图 + 1:1 动作 GIF -->
    <div class="pane orig">
      <div class="bar"><h3>原始动作 <small id="aname">—</small></h3>
        <label class="seg" title="背景色(显示+导出给AI+导入抠图都用它; 黑白绿自己挑, 哪个底抠你的角色最干净用哪个)">背景 <select id="bgsel"><option value="green">绿幕</option><option value="white">白</option><option value="black">黑</option><option value="gray">灰</option></select></label>
        <button id="export" class="btn" disabled>导出序列图 ↓</button></div>
      <div class="showrow">
        <div class="stripcol">
          <div class="giftitle">序列帧</div>
          <div class="stripwrap"><img id="ostrip" alt=""></div>
        </div>
        <div class="gifcol">
          <div class="giftitle">动作预览 (1:1)</div>
          <div class="gifbox"><img id="ogif" alt=""></div>
        </div>
      </div>
      <div class="promptbox">
        <div class="plabel">喂 AI 的提示词 <small>(只填角色，其余自动带)</small></div>
        <div class="prow">
          <input id="charDesc" placeholder="填你要的角色，例如：赛博朋克女忍者，深蓝连帽夹克，霓虹紫长发，半截面罩">
          <span class="langseg">
            <label class="seg"><input type="radio" name="plang" value="zh" checked> 中</label>
            <label class="seg"><input type="radio" name="plang" value="en"> EN</label>
          </span>
          <button id="copyPrompt" class="btn primary">复制提示词</button>
        </div>
        <details><summary>查看完整提示词</summary><textarea id="promptText" readonly></textarea></details>
      </div>
    </div>

    <!-- 下区: 导入 / 替换后 — 导入效果 + 1:1 预览 -->
    <div class="pane edit">
      <div class="bar"><h3>导入 / 替换后</h3>
        <button id="lock" class="btn" disabled title="把此动作的替换帧固定生效 — 写入草稿, 重启/切角色不丢, 可继续换其它动作攒成完整角色">固定生效</button>
        <button id="clear" class="btn" disabled>还原此动作</button></div>
      <div class="showrow">
        <div class="stripcol">
          <div class="giftitle">拖入 AI 横图 → 自动切片替换</div>
          <div id="drop" class="stripwrap drop">
            <img id="nstrip" alt=""><span class="hint" id="drophint"><span id="drophintText">把 AI 生成的横图拖进来 = 一键替换</span></span></div>
        </div>
        <div class="gifcol">
          <div class="giftitle">替换后预览 (1:1)</div>
          <div class="gifbox"><img id="ngif" alt=""></div>
        </div>
      </div>
      <div class="opt">纯色底扣除 <small>默认自动识别角落底色</small> · <label>不准时手动指定 <input type="color" id="bgkey" value="#00ff00"> <input type="checkbox" id="bgon"> 覆盖</label></div>
      <div class="alignbox" id="alignbox" hidden tabindex="0">
        <div class="alabel">逐帧对齐 <small>① 点下面的帧选中 → ② 方向键 ←→↑↓ 移动到和原图（淡色叠底）贴合 · +/− 缩放</small></div>
        <div class="alignframes" id="alignframes"></div>
        <div class="alignmain">
          <div class="overlaywrap"><img id="alignoverlay" alt="原图 ghost + 替换帧 叠加"></div>
          <div class="arow">
            <span class="agrp">大小 <input type="range" id="alignscale" min="0.5" max="1.6" step="0.02" value="1"><b id="alignscaleval">1.00</b></span>
            <button class="btn" id="alignreset">重置此帧</button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="toast" class="toast hidden"></div>
<script type="module" src="/js/main.js"></script>
</body></html>
